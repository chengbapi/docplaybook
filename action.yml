name: 'DocPlaybook Translate'
description: 'Translate Markdown docs with docplaybook and commit the results back to the branch.'

inputs:
  working-directory:
    description: 'Directory containing .docplaybook/config.json. Defaults to the repo root.'
    default: '.'
  langs:
    description: 'Comma-separated target languages to translate. Defaults to all languages in config.'
    default: ''
  commit-message:
    description: 'Commit message used when pushing translated files.'
    default: 'chore: sync translations [skip ci]'
  node-version:
    description: 'Node.js version to use.'
    default: '20'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install docplaybook
      shell: bash
      run: npm install -g docplaybook

    - name: Translate
      shell: bash
      run: |
        LANGS="${{ inputs.langs }}"
        if [ -n "$LANGS" ]; then
          docplaybook translate "${{ inputs.working-directory }}" --langs "$LANGS"
        else
          docplaybook translate "${{ inputs.working-directory }}"
        fi

    - name: Commit and push translations
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if git diff --staged --quiet; then
          echo "All translations are up to date. Nothing to commit."
          exit 0
        fi
        git commit -m "${{ inputs.commit-message }}"
        git pull --rebase origin HEAD
        git push
